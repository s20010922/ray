<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAY MONITOR · 系統總覽</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b12; --card:#0d1424; --card2:#121b30; --card3:#16203a;
  --nb:#22d3ff; --ng:#2dffa0; --nr:#ff3b5c; --no:#ffa033; --np:#c08bff;
  --tp:#eaf4ff; --ts:#9fb6d4; --tm:#6d86a6;
  --mono:'Cascadia Code','Consolas','Courier New',monospace;
  --line:rgba(34,211,255,.20);
}
html,body{height:100%}
body{background:
   radial-gradient(1400px 700px at 80% -10%,rgba(34,211,255,.06),transparent),
   var(--bg);
  color:var(--tp);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.5;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#0b1322,#070b12);flex-shrink:0}
.htitle{font-size:20px;font-weight:800;letter-spacing:4px;color:var(--nb);
  text-shadow:0 0 16px rgba(34,211,255,.55)}
.hsub{font-size:12px;color:var(--ts);letter-spacing:1.5px;margin-top:4px}
.hclock{font-family:var(--mono);font-size:19px;color:var(--nb);letter-spacing:2px;font-weight:600}

/* 三欄滿版：節點 | Ray 元件 | Pipeline */
.wrap{flex:1;display:grid;grid-template-columns:420px minmax(0,1fr) 320px;gap:16px;
  padding:16px 20px;align-items:stretch;width:100%;min-height:0}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px 20px;display:flex;flex-direction:column;min-height:0;
  box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 0 30px rgba(0,0,0,.25);overflow-y:auto}
/* 左欄不顯示捲軸（內容已壓緊，溢出時仍可滾輪捲動） */
.panel.noscroll{scrollbar-width:none}
.panel.noscroll::-webkit-scrollbar{display:none}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.pt{font-size:15px;font-weight:800;letter-spacing:2px;color:var(--ng);text-transform:uppercase}
.pt .zh{display:block;color:var(--ts);font-weight:500;letter-spacing:1px;font-size:11.5px;margin-top:3px}
.dot{width:10px;height:10px;border-radius:50%;background:#2a3a52;display:inline-block}
.dot.ok{background:var(--ng);box-shadow:0 0 10px var(--ng);animation:p 1.3s infinite}
.dot.warn{background:var(--nr);box-shadow:0 0 10px var(--nr)}
.dot.idle{background:#3a4d68}
@keyframes p{0%,100%{opacity:1}50%{opacity:.35}}

/* ── 左欄：叢集節點（放大但壓緊高度，免捲軸）── */
.big{font-size:44px;font-weight:800;color:var(--nb);font-family:var(--mono);line-height:1;
  text-shadow:0 0 20px rgba(34,211,255,.4)}
.big small{font-size:14px;color:var(--ts);font-weight:500;margin-left:8px}
.rlabel{display:flex;justify-content:space-between;font-size:13.5px;
  font-family:var(--mono);color:var(--ts);margin-top:11px;margin-bottom:5px}
.rlabel b{color:var(--tp)}
.bar{height:9px;background:#0a111f;border-radius:5px;overflow:hidden;border:1px solid rgba(34,211,255,.1)}
.bar>div{height:100%;background:linear-gradient(90deg,var(--nb),var(--ng));
  transition:width .5s;box-shadow:0 0 10px rgba(45,255,160,.4)}
.nodes{display:flex;flex-direction:column;gap:11px;margin-top:16px}
.node{display:flex;flex-direction:column;gap:8px;padding:13px 16px;
  background:var(--card2);border:1px solid var(--line);border-radius:11px;transition:.3s}
.node.busy{border-color:rgba(45,255,160,.4);background:var(--card3)}
.node .ntop{display:flex;align-items:center;gap:10px}
.node .role{font-size:12.5px;font-weight:800;letter-spacing:1px;padding:4px 11px;border-radius:6px;white-space:nowrap}
.role.Head{color:var(--no);background:rgba(255,160,51,.1);border:1px solid rgba(255,160,51,.45)}
.role.Worker{color:var(--np);background:rgba(192,139,255,.1);border:1px solid rgba(192,139,255,.45)}
.node .nname{font-size:17px;font-weight:700;color:var(--tp);white-space:nowrap}
.node .tasks{font-family:var(--mono);font-size:14px;font-weight:700;padding:4px 11px;border-radius:6px;
  color:var(--tm);border:1px solid var(--line);white-space:nowrap}
.node .tasks.on{color:#062;background:var(--ng);box-shadow:0 0 10px rgba(45,255,160,.5)}
.node .nip{font-family:var(--mono);font-size:13px;color:var(--tm);margin-left:auto;white-space:nowrap}
.node .res{font-family:var(--mono);font-size:14px;color:var(--ts);letter-spacing:.2px;white-space:nowrap}
.node .res b{color:var(--ng);font-weight:700}
.node .load{display:flex;align-items:center;gap:10px;margin-top:5px}
.node .llabel{font-family:var(--mono);font-size:13px;color:var(--tm);width:40px;flex-shrink:0}
.node .lbar{flex:1;height:8px;background:#0a111f;border-radius:5px;overflow:hidden;border:1px solid rgba(34,211,255,.1)}
.node .lbar>div{height:100%;transition:width .5s}
.node .ltxt{font-family:var(--mono);font-size:14px;color:var(--ts);white-space:nowrap;width:60px;text-align:right}
.node .ltxt b{color:var(--tp);font-weight:700}
.lvl-lo>div{background:linear-gradient(90deg,#1c6,var(--ng))}
.lvl-mid>div{background:linear-gradient(90deg,var(--no),#fc4)}
.lvl-hi>div{background:linear-gradient(90deg,#c33,var(--nr))}

/* ── 中欄：Ray 元件（2×2，滾動 log）── */
.comp{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:14px;min-height:0}
.citem{background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:16px 18px;display:flex;flex-direction:column;min-height:0;transition:.3s}
.citem.on{border-color:rgba(45,255,160,.5);background:var(--card3);box-shadow:0 0 24px rgba(45,255,160,.1)}
.crow{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cname{font-size:20px;font-weight:800;color:var(--nb);letter-spacing:.5px}
.cstate{font-size:10.5px;font-weight:800;letter-spacing:1.5px;padding:5px 11px;border-radius:6px}
.cstate.act{color:#062;background:var(--ng);box-shadow:0 0 12px rgba(45,255,160,.5)}
.cstate.idle{color:var(--tm);border:1px solid var(--line)}
.cdoing{font-size:14.5px;color:var(--tp);margin-top:14px;font-weight:600;flex-shrink:0;
  display:flex;align-items:center;gap:10px;min-height:22px}
.clog{flex:1;margin-top:12px;min-height:90px;background:#080e1a;
  border:1px solid rgba(34,211,255,.1);border-radius:8px;padding:9px 13px 12px;
  box-sizing:border-box;overflow-x:hidden;
  font-family:var(--mono);font-size:12px;line-height:1.7;overflow-y:auto;
  display:flex;flex-direction:column;gap:1px}
.clog::-webkit-scrollbar{width:7px}
.clog::-webkit-scrollbar-thumb{background:rgba(34,211,255,.25);border-radius:4px}
.clog .llbl{font-size:9.5px;letter-spacing:1.5px;color:var(--tm);margin-bottom:4px;
  text-transform:uppercase;position:sticky;top:0;background:#080e1a;padding-bottom:2px;flex-shrink:0}
.clog .ll{color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex-shrink:0;min-width:0;max-width:100%;padding-right:3px;box-sizing:border-box}
.clog .ll:last-child{color:var(--ng)}
.clog .empty{color:var(--tm);font-style:italic;font-size:11px}
.cdesc{font-size:12px;color:var(--ts);margin-top:12px;padding-top:12px;line-height:1.55;flex-shrink:0;
  border-top:1px solid rgba(34,211,255,.1)}

/* ── 右欄：Pipeline 流程（直式步驟）── */
.pipe{display:flex;flex-direction:column;gap:0}
.pstep{display:flex;align-items:flex-start;gap:13px;padding:9px 2px 16px;position:relative}
.pstep:not(.last)::before{content:'';position:absolute;left:17px;top:38px;bottom:2px;
  width:2px;background:var(--line)}
.pstep.done:not(.last)::before{background:rgba(45,255,160,.45)}
.pnum{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:15px;font-weight:800;
  border:1px solid var(--line);color:var(--tm);background:#0a111f;position:relative;z-index:1;transition:.3s}
.pstep.done .pnum{color:#052012;background:var(--ng);border-color:var(--ng)}
.pstep.cur .pnum{color:#052012;background:var(--ng);border-color:var(--ng);
  box-shadow:0 0 16px rgba(45,255,160,.7);animation:p 1.3s infinite}
.ptxt{padding-top:8px}
.pmain{font-size:15px;font-weight:700;color:var(--tm);transition:.3s}
.pstep.done .pmain{color:var(--ng)}
.pstep.cur .pmain{color:var(--tp)}
.psub{font-size:11px;color:var(--tm);font-family:var(--mono);margin-top:2px}
.pstep.cur .psub{color:var(--ng)}
.finish{margin-top:16px;padding:16px;border-radius:11px;text-align:center;font-weight:800;
  color:#052012;background:var(--ng);box-shadow:0 0 26px rgba(45,255,160,.55);
  font-size:16px;letter-spacing:1px;animation:p 1.6s infinite}
.finish small{display:block;font-size:11px;font-weight:600;color:#0a3a22;margin-top:4px;letter-spacing:.5px}
/* 兩條流程：群組標題 + 徽章 + 可上線狀態 */
.pgroup{margin-bottom:14px}
.pgroup+.pgroup{padding-top:14px;border-top:1px dashed rgba(34,211,255,.18)}
.pname{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;
  color:var(--tp);letter-spacing:.5px;margin:0 0 10px 2px}
.pbadge{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.pbadge.ok{color:#052012;background:var(--ng)}
.pbadge.rdy{color:#052012;background:var(--tp)}
.pbadge.run{color:#052012;background:var(--ng);animation:p 1.3s infinite}
.pbadge.idle{color:var(--tm);border:1px solid var(--line)}
.pstep.ready .pnum{color:#052012;background:var(--tp);border-color:var(--tp)}
.pstep.ready .pmain{color:var(--tp)}
.pstep.ready .psub{color:var(--tp)}
.pstep.ready:not(.last)::before{background:rgba(34,211,255,.4)}
</style>
</head>
<body>
<header>
  <div>
    <div class="htitle">◆ RAY MONITOR</div>
    <div class="hsub">高速公路 CCTV 車流／車禍偵測 · Ray 叢集即時監控</div>
  </div>
  <div class="hclock" id="clk">--:--:--</div>
</header>

<div class="wrap">
  <!-- 左：叢集節點 -->
  <div class="panel noscroll">
    <div class="ph">
      <div class="pt">Cluster Nodes<span class="zh">叢集節點</span></div>
      <span class="dot" id="cdot"></span>
    </div>
    <div class="big"><span id="nodeN">–</span><small>active nodes</small></div>
    <div class="rlabel"><span>CPU</span><b id="cpuTxt">–</b></div>
    <div class="bar"><div id="cpuBar" style="width:0%"></div></div>
    <div class="rlabel"><span>GPU</span><b id="gpuTxt">–</b></div>
    <div class="bar"><div id="gpuBar" style="width:0%"></div></div>
    <div class="rlabel"><span>OBJ STORE</span><b id="objTxt">–</b></div>
    <div class="bar"><div id="objBar" style="width:0%"></div></div>
    <div class="nodes" id="nodeList"></div>
  </div>

  <!-- 中：Ray 元件 -->
  <div class="panel">
    <div class="ph">
      <div class="pt">Ray Components<span class="zh">技術堆疊 · 即時活動</span></div>
      <span class="dot ok"></span>
    </div>
    <div class="comp">
      <div class="citem" id="c-data"><div class="crow"><div class="cname">① Ray Data</div><div class="cstate idle" id="s-data">IDLE</div></div>
        <div class="cdoing"><span class="dot idle" id="d-data"></span><span id="doing-data">–</span></div>
        <div class="clog" id="log-data"><div class="empty">—</div></div>
        <div class="cdesc" id="desc-data">資料前處理</div></div>
      <div class="citem" id="c-tune"><div class="crow"><div class="cname">② Ray Tune</div><div class="cstate idle" id="s-tune">IDLE</div></div>
        <div class="cdoing"><span class="dot idle" id="d-tune"></span><span id="doing-tune">–</span></div>
        <div class="clog" id="log-tune"><div class="empty">—</div></div>
        <div class="cdesc" id="desc-tune">超參搜尋</div></div>
      <div class="citem" id="c-train"><div class="crow"><div class="cname">③ Ray Train</div><div class="cstate idle" id="s-train">IDLE</div></div>
        <div class="cdoing"><span class="dot idle" id="d-train"></span><span id="doing-train">–</span></div>
        <div class="clog" id="log-train"><div class="empty">—</div></div>
        <div class="cdesc" id="desc-train">分散式訓練</div></div>
      <div class="citem" id="c-serve"><div class="crow"><div class="cname">④ Ray Serve</div><div class="cstate idle" id="s-serve">IDLE</div></div>
        <div class="cdoing"><span class="dot idle" id="d-serve"></span><span id="doing-serve">–</span></div>
        <div class="clog" id="log-serve"><div class="empty">—</div></div>
        <div class="cdesc" id="desc-serve">即時推論服務</div></div>
    </div>
  </div>

  <!-- 右：Pipeline 流程 -->
  <div class="panel">
    <div class="ph">
      <div class="pt">Pipeline<span class="zh">車流 · 車禍 兩條流程</span></div>
      <span class="dot" id="pdot"></span>
    </div>
    <div class="pipe" id="pipe"></div>
  </div>
</div>

<script>
function clock(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false});}
setInterval(clock,1000); clock();
const esc=s=>String(s).replace(/[<>&]/g,'');

const lvl=p=>p>=80?'lvl-hi':p>=40?'lvl-mid':'lvl-lo';
const loadRow=(label,pct,txt)=>
  '<div class="load"><span class="llabel">'+label+'</span>'+
  '<div class="lbar '+lvl(pct)+'"><div style="width:'+pct+'%"></div></div>'+
  '<span class="ltxt">'+(txt!==undefined?txt:'<b>'+pct+'%</b>')+'</span></div>';

async function pollCluster(){
  try{
    const r=await fetch('/cluster.json?_='+Date.now(),{signal:AbortSignal.timeout(6000)});
    if(!r.ok) throw 0;
    const d=await r.json();
    document.getElementById('cdot').className='dot ok';
    document.getElementById('nodeN').textContent=d.node_count;
    const cp=d.cpu_total?(d.cpu_used/d.cpu_total*100):0, gp=d.gpu_total?(d.gpu_used/d.gpu_total*100):0;
    document.getElementById('cpuTxt').textContent=d.cpu_used+' / '+d.cpu_total+' ('+cp.toFixed(0)+'%)';
    document.getElementById('gpuTxt').textContent=d.gpu_used+' / '+d.gpu_total+' ('+gp.toFixed(0)+'%)';
    document.getElementById('cpuBar').style.width=cp+'%';
    document.getElementById('gpuBar').style.width=gp+'%';
    document.getElementById('objTxt').textContent=d.obj_used_gb+' / '+d.obj_total_gb+'G ('+d.obj_pct+'%)';
    document.getElementById('objBar').style.width=d.obj_pct+'%';
    document.getElementById('nodeList').innerHTML=d.nodes.map((n,i)=>
      '<div class="node'+(n.ray_tasks>0?' busy':'')+'">'+
        '<div class="ntop">'+
          '<span class="role '+n.role+'">'+n.role+'</span>'+
          '<span class="nname">'+(n.alive?'●':'○')+' 節點 '+(i+1)+'</span>'+
          '<span class="tasks'+(n.ray_tasks>0?' on':'')+'">⚡'+n.ray_tasks+' 任務</span>'+
          '<span class="nip">'+n.address+'</span>'+
        '</div>'+
        '<div class="res">CPU <b>'+n.cpu+'</b>核 · GPU <b>'+n.gpu+'</b> · RAM <b>'+n.mem_gb+'G</b> · OBJ <b>'+n.obj_gb+'G</b></div>'+
        loadRow('Ray', n.ray_pct, '<b>'+n.ray_tasks+'</b>/'+n.cpu)+
        (n.gpu ? loadRow('GPU', n.gpu_pct) : '')+
        loadRow('MEM', n.mem_pct)+
        loadRow('OBJ', n.obj_pct)+
      '</div>').join('');
  }catch(e){ document.getElementById('cdot').className='dot warn'; }
}

function setComp(key,c){
  document.getElementById('c-'+key).className='citem'+(c.active?' on':'');
  const st=document.getElementById('s-'+key);
  st.className='cstate '+(c.active?'act':'idle'); st.textContent=c.active?'ACTIVE':'IDLE';
  document.getElementById('d-'+key).className='dot '+(c.active?'ok':'idle');
  document.getElementById('doing-'+key).textContent=c.doing;
  if(typeof c.detail==='string') document.getElementById('desc-'+key).textContent=c.detail;
  const lg=document.getElementById('log-'+key);
  const lines=(c.log||[]);
  // 有新 log 才更新；沒有就保留上次（不消失），並自動捲到最新
  if(lg && lines.length){
    lg.innerHTML=lines.map(l=>'<div class="ll">'+esc(l)+'</div>').join('');
    lg.scrollTop=lg.scrollHeight;
  }
}
async function pollComponents(){
  try{
    const r=await fetch('/components.json?_='+Date.now(),{signal:AbortSignal.timeout(6000)});
    if(!r.ok) throw 0;
    const d=await r.json();
    ['data','train','tune','serve'].forEach(k=>setComp(k,d[k]));
  }catch(e){}
}

const BADGE={done:['ok','完成'],ready:['rdy','可上線'],running:['run','執行中'],
  partial:['idle','進行中'],idle:['idle','待開始']};
function renderPipe(p){
  const done=new Set(p.done||[]), cur=p.current, ready=p.ready, last=p.stages.length-1;
  const steps=p.stages.map((s,i)=>{
    const state=done.has(s.id)?'done':(s.id===cur?'cur':(s.id===ready?'ready':'todo'));
    const sub={done:'完成',cur:'進行中…',ready:'可上線',todo:'待處理'}[state];
    const num=state==='done'?'✓':(state==='ready'?'◆':(i+1));
    return '<div class="pstep '+state+(i===last?' last':'')+'">'+
      '<div class="pnum">'+num+'</div>'+
      '<div class="ptxt"><div class="pmain">'+esc(s.label)+'</div>'+
      '<div class="psub">'+sub+'</div></div></div>';
  }).join('');
  const b=BADGE[p.status]||BADGE.idle;
  return '<div class="pgroup"><div class="pname">'+esc(p.name)+
    '<span class="pbadge '+b[0]+'">'+b[1]+'</span></div>'+steps+'</div>';
}
async function pollPipeline(){
  try{
    const r=await fetch('/pipeline.json?_='+Date.now(),{signal:AbortSignal.timeout(6000)});
    if(!r.ok) throw 0;
    const d=await r.json();
    const pls=d.pipelines||[];
    const anyRun=pls.some(p=>p.current);
    document.getElementById('pdot').className='dot '+(anyRun?'ok':(pls.every(p=>p.status==='done'||p.status==='ready')?'ok':'idle'));
    document.getElementById('pipe').innerHTML=pls.map(renderPipe).join('');
  }catch(e){}
}

pollCluster(); pollComponents(); pollPipeline();
setInterval(pollCluster,2000);
setInterval(pollComponents,1000);
setInterval(pollPipeline,2000);
</script>
</body>
</html>
