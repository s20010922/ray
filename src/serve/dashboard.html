<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FREIGHTWAY AI · 智慧國道監控</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #080c14;
  --bg-card:  #0b1020;
  --bg-card2: #0e1428;
  --nb:       #00c8ff;
  --ng:       #00ff88;
  --nr:       #ff2040;
  --no:       #ff8c00;
  --tp:       #eaf4ff;
  --tm:       #8198b6;
  --bblue:    rgba(0,200,255,.22);
  --baccent:  rgba(0,200,255,.55);
  --mono:     'Cascadia Code','Consolas','Courier New',monospace;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tp);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden}

/* ── HEADER ─────────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:50px;flex-shrink:0;
  background:linear-gradient(180deg,#0a1020 0%,var(--bg) 100%);
  border-bottom:1px solid rgba(0,200,255,.12);position:relative;z-index:10;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--nb),transparent);opacity:.5;
}
.hbrand{display:flex;align-items:center;gap:10px}
.hicon{
  width:30px;height:30px;border:1.5px solid var(--nb);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 10px rgba(0,200,255,.35);color:var(--nb);
}
.htitle{font-size:16px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--nb);text-shadow:0 0 14px rgba(0,200,255,.5)}
.hsub{font-size:11px;color:var(--tm);letter-spacing:1.5px;margin-top:3px}
.hright{display:flex;align-items:center;gap:18px}
.hitem{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tm);font-family:var(--mono)}
.hdot{width:7px;height:7px;border-radius:50%;background:#222;transition:background .3s,box-shadow .3s}
.hdot.ok{background:var(--ng);box-shadow:0 0 7px var(--ng)}
.hdot.fail{background:#ff4060}
.hdot.pulse{background:var(--ng);box-shadow:0 0 7px var(--ng);animation:dp 1.1s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
.hclock{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--nb);letter-spacing:2px}

/* ── APP WRAP ────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh}
main{
  flex:1;display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:7px;padding:7px;overflow:hidden;
}

/* ── CAMERA CARD ─────────────────────────── */
.cam-card{
  position:relative;background:var(--bg-card);border-radius:10px;overflow:hidden;
  border:1px solid var(--bblue);
  box-shadow:0 0 14px rgba(0,200,255,.06),inset 0 0 24px rgba(0,0,0,.35);
  transition:border-color .3s,box-shadow .3s;
}
.cam-card:hover{border-color:var(--baccent);box-shadow:0 0 22px rgba(0,200,255,.18)}
.cam-card img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;background:#000;
}
/* scanlines */
.cam-card::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
/* corner brackets */
.cc{position:absolute;width:13px;height:13px;z-index:7}
.cc.tl{top:0;left:0;border-top:2px solid var(--nb);border-left:2px solid var(--nb);border-radius:3px 0 0 0}
.cc.tr{top:0;right:0;border-top:2px solid var(--nb);border-right:2px solid var(--nb);border-radius:0 3px 0 0}
.cc.bl{bottom:0;left:0;border-bottom:2px solid var(--nb);border-left:2px solid var(--nb);border-radius:0 0 0 3px}
.cc.br{bottom:0;right:0;border-bottom:2px solid var(--nb);border-right:2px solid var(--nb);border-radius:0 0 3px 0}

/* top overlay */
.c-top{
  position:absolute;top:0;left:0;right:0;z-index:5;
  padding:9px 11px 26px;
  background:linear-gradient(180deg,rgba(0,0,0,.78) 0%,transparent 100%);
  display:flex;align-items:flex-start;justify-content:space-between;
}
.c-badge{
  display:flex;align-items:center;gap:4px;padding:3px 9px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.14);
  border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;
  color:#90a4bd;white-space:nowrap;flex-shrink:0;transition:color .3s,border-color .3s;
}
.c-badge.live{color:var(--ng);border-color:rgba(0,255,136,.28)}
.c-badge .bd{width:5px;height:5px;border-radius:50%;background:currentColor;animation:dp 1s infinite}

/* per-cell one-line log（每格底下一條，每輪更新）*/
.c-log{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  padding:16px 11px 8px;
  background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,transparent 100%);
  font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ng);
  text-shadow:0 0 8px rgba(0,255,136,.4);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.c-log.off{color:var(--tm);text-shadow:none}

/* ── BRAIN PANEL ─────────────────────────── */
.brain{
  background:linear-gradient(135deg,var(--bg-card2) 0%,#080c18 100%);
  border:1px solid var(--bblue);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 24px rgba(0,200,255,.05),inset 0 0 40px rgba(0,0,0,.5);
}
.bh{
  padding:9px 13px;border-bottom:1px solid rgba(0,200,255,.1);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.btitle{
  font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--nb);text-shadow:0 0 10px rgba(0,200,255,.4);font-family:var(--mono);
}
.bhealthrow{display:flex;gap:11px}
.bhi{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);font-family:var(--mono)}
.bhd{width:6px;height:6px;border-radius:50%;background:#222;transition:background .3s,box-shadow .3s}
.bhd.ok{background:var(--ng);box-shadow:0 0 5px var(--ng)}
.bhd.fail{background:#ff4060}

/* log */
.log{
  flex:1;overflow-y:auto;padding:8px 11px;
  font-family:var(--mono);font-size:12px;line-height:1.7;
  scrollbar-width:thin;scrollbar-color:rgba(0,200,255,.25) transparent;
}
.log::-webkit-scrollbar{width:3px}
.log::-webkit-scrollbar-track{background:transparent}
.log::-webkit-scrollbar-thumb{background:rgba(0,200,255,.25);border-radius:2px}
.ll{display:flex;gap:7px;word-break:break-word}
.lt{color:var(--tm);flex-shrink:0}
.lc{color:var(--nb);flex-shrink:0;min-width:172px}
.lm.ok{color:var(--ng)}
.lm.warn{color:var(--no)}
.lm.err{color:var(--nr)}
.lm.info{color:#7fa0b8}
.lm.sys{color:#9fb0c4}

/* tick / progress */
.tbar{
  padding:6px 10px;border-top:1px solid rgba(0,200,255,.07);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.tinfo{font-size:11px;color:var(--tm);font-family:var(--mono)}
.tinfo span{color:var(--nb);font-weight:700}
.pbwrap{flex:1;height:2px;background:rgba(0,200,255,.1);border-radius:1px;margin:0 9px;overflow:hidden}
.pbfill{height:100%;background:linear-gradient(90deg,var(--nb),var(--ng));
  border-radius:1px;box-shadow:0 0 6px var(--nb);transition:width .08s linear}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<header>
  <div class="hbrand">
    <div class="hicon">&#9649;</div>
    <div>
      <div class="htitle">FREIGHTWAY AI</div>
      <div class="hsub">SMART HIGHWAY MONITOR &middot; 5 FOCUS CAMS &middot; REAL-TIME VEHICLE DETECT</div>
    </div>
  </div>
  <div class="hright">
    <div class="hitem"><div class="hdot" id="hdt"></div>Traffic API</div>
    <div class="hitem"><div class="hdot pulse"></div><span id="hTick">TICK 0000</span></div>
    <div class="hclock" id="hClk">00:00:00</div>
  </div>
</header>

<!-- MAIN GRID -->
<main id="grid">
  <!-- camera cards injected by JS -->

  <!-- BRAIN PANEL (slot 6) -->
  <div class="brain" id="brain">
    <div class="bh">
      <div class="btitle">&#9672; EVENT LOG &middot; &#20840;&#22495;&#20107;&#20214;</div>
      <div class="bhealthrow">
        <div class="bhi"><div class="bhd" id="bht"></div>TRF</div>
      </div>
    </div>
    <div class="log" id="log"></div>
    <div class="tbar">
      <div class="tinfo">CYCLE <span id="tn">0000</span></div>
      <div class="pbwrap"><div class="pbfill" id="pb" style="width:0%"></div></div>
      <div class="tinfo">NEXT <span id="ns">4.0</span>s</div>
    </div>
  </div>
</main>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────
const CFG = {
  pollMs: 2000,
  base: '/live_focus/',
  imgBase: '/live_focus/',   // 同源由 Ray Serve 後端提供（標註幀），免 CORS proxy
  cameras: [
    { id: 'CCTV-N1-S-34.018-M',  name: '國1南 34K+020',  sub: '高公局交流道' },
    { id: 'CCTV-N3-S-40.980-M',  name: '國3南 40K+980',  sub: '土城路段'     },
    { id: 'CCTV-N1-N-37.050-M',  name: '國1北 37K+050',  sub: '泰山路段'     },
    { id: 'CCTV-N1H-S-17.450-M', name: '國1H南 17K+450', sub: '內湖交流道'   },
    { id: 'CCTV-N1-S-93.080-M',  name: '國1南 93K+080',  sub: '新竹路段'     }
  ]
};

// ─── STATE ───────────────────────────────────────
const S = {
  tick: 0,
  cams: Object.fromEntries(CFG.cameras.map(c => [c.id, {
    vehicles: 0, countLevel: '-', densityLevel: '-', capturedAt: '-',
    online: false, lastDensity: '-', lastCount: '-'
  }]))
};

// ─── BUILD CAMERA CARDS ──────────────────────────
const grid = document.getElementById('grid');
const brain = document.getElementById('brain');

function buildCards() {
  CFG.cameras.forEach(cam => {
    const el = document.createElement('article');
    el.className = 'cam-card';
    el.id = 'card-' + cam.id;
    el.innerHTML =
      '<img id="img-' + cam.id + '" alt="">' +
      '<div class="cc tl"></div><div class="cc tr"></div>' +
      '<div class="cc bl"></div><div class="cc br"></div>' +
      '<div class="c-top">' +
        '<div></div>' +
        '<div class="c-badge" id="bdg-' + cam.id + '"><span class="bd"></span> WAIT</div>' +
      '</div>' +
      '<div class="c-log off" id="lg-' + cam.id + '">— 等待資料 —</div>';
    grid.insertBefore(el, brain);
  });
}

// ─── IMAGE LOAD ─────────────────────────────────
function loadImg(cam) {
  const img = document.getElementById('img-' + cam.id);
  if (!img) return;
  img.src = CFG.imgBase + cam.id + '.jpg?_=' + Date.now();
  img.onload  = () => setBadge(cam.id, true);
  img.onerror = () => setBadge(cam.id, false);
}

function setBadge(id, live) {
  const el = document.getElementById('bdg-' + id);
  if (!el) return;
  el.className = 'c-badge' + (live ? ' live' : '');
  el.innerHTML = '<span class="bd"></span> ' + (live ? 'LIVE' : 'OFFLINE');
}

async function fetchJson(camId) {
  try {
    const r = await fetch(CFG.base + camId + '.json?_=' + Date.now(),
      { signal: AbortSignal.timeout(6000) });
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

function setHealthDots(ok) {
  const cls = ok ? 'ok' : 'fail';
  const bht = document.getElementById('bht'); if (bht) bht.className = 'bhd ' + cls;
  const hdt = document.getElementById('hdt'); if (hdt) hdt.className = 'hdot ' + cls;
}

async function checkHealth() {
  try {
    const r = await fetch(CFG.base + CFG.cameras[0].id + '.json?_=' + Date.now(),
      { signal: AbortSignal.timeout(5000) });
    setHealthDots(r.ok);
  } catch { setHealthDots(false); }
}

// ─── POLL LOOP ───────────────────────────────────
let pollTimer = null, progTimer = null;
let cycleElapsed = 0;

async function pollOnce() {
  S.tick++;
  const ts = String(S.tick).padStart(4, '0');
  document.getElementById('hTick').textContent = 'TICK ' + ts;
  document.getElementById('tn').textContent = ts;
  cycleElapsed = 0;

  for (const cam of CFG.cameras) {
    // refresh image
    const img = document.getElementById('img-' + cam.id);
    if (img) {
      img.onload  = () => setBadge(cam.id, true);
      img.onerror = () => setBadge(cam.id, false);
      img.src = CFG.imgBase + cam.id + '.jpg?_=' + Date.now();
    }
    // fetch detection JSON
    const cs = S.cams[cam.id];
    const data = await fetchJson(cam.id);
    const lg = document.getElementById('lg-' + cam.id);
    if (data) {
      const v  = data.num_detections ?? 0;
      const cl = data.count_level    ?? '-';
      const dl = data.density_level  ?? '-';
      const tm = (data.captured_at ?? '').slice(11) || '--:--:--';
      // 每格底下一條：當下車數/數量/密度/時間
      if (lg) { lg.className = 'c-log'; lg.textContent =
        '車 ' + v + ' · 數量 ' + cl + ' · 密度 ' + dl + ' · ' + tm; }
      // 全域事件 log：只記值得注意的轉變
      if (!cs.online) addLog('ok', cam.id, '✓ 鏡頭上線');
      if (dl === 'HIGH' && cs.lastDensity !== 'HIGH')
        addLog('warn', cam.id, '⚠ 車流壅塞 · 密度 HIGH（車 ' + v + '）');
      else if (cl === 'HIGH' && cs.lastCount !== 'HIGH')
        addLog('warn', cam.id, '⚠ 車輛偏多 · 數量 HIGH（車 ' + v + '）');
      Object.assign(cs, { vehicles: v, countLevel: cl, densityLevel: dl,
        capturedAt: data.captured_at ?? '', online: true,
        lastDensity: dl, lastCount: cl });
    } else {
      if (cs.online !== false) addLog('err', cam.id, '✕ 鏡頭離線');
      cs.online = false;
      if (lg) { lg.className = 'c-log off'; lg.textContent = '— 離線 —'; }
    }
  }
}

function startPoll() {
  pollOnce();
  pollTimer = setInterval(pollOnce, CFG.pollMs);
  progTimer = setInterval(() => {
    cycleElapsed = Math.min(cycleElapsed + 80, CFG.pollMs);
    const pct = (cycleElapsed / CFG.pollMs) * 100;
    const pb = document.getElementById('pb');
    const ns = document.getElementById('ns');
    if (pb) pb.style.width = pct + '%';
    if (ns) ns.textContent = ((CFG.pollMs - cycleElapsed) / 1000).toFixed(1);
  }, 80);
}

// ─── LOG ─────────────────────────────────────────
let logN = 0;
function addLog(type, cam, msg) {
  logN++;
  const t   = new Date().toLocaleTimeString('zh-TW', { hour12: false });
  const div = document.createElement('div');
  div.className = 'll';
  const camShort = cam.length > 24 ? cam.slice(0, 22) + '…' : cam;
  div.innerHTML =
    '<span class="lt">[' + t + ']</span>' +
    '<span class="lc">' + camShort + '</span>' +
    '<span class="lm ' + type + '">' + msg + '</span>';
  const logEl = document.getElementById('log');
  if (!logEl) return;
  logEl.appendChild(div);
  if (logN > 250) { logEl.removeChild(logEl.firstChild); logN--; }
  logEl.scrollTop = logEl.scrollHeight;
}

// ─── CLOCK ───────────────────────────────────────
function tick() {
  const el = document.getElementById('hClk');
  if (el) el.textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
}
setInterval(tick, 1000); tick();

// ─── INIT ────────────────────────────────────────
buildCards();
CFG.cameras.forEach(loadImg);
addLog('sys', 'SYSTEM', '系統啟動 · FREIGHTWAY AI · 全域事件監看');
addLog('sys', 'SYSTEM', CFG.cameras.length + ' cams · poll ' + CFG.pollMs + 'ms · 只記壅塞/離線等事件');
checkHealth().then(() => addLog('sys', 'SYSTEM', 'Data server health check done'));
setInterval(checkHealth, 30000);
startPoll();
</script>
</body>
</html>
